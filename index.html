<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产组合</title>
<style>
  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --border: #e8eaef;
    --text: #1a1d28;
    --text-secondary: #6b7187;
    --text-tertiary: #9ca3b4;
    --accent: #2563eb;
    --accent-dim: #eff4ff;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --amber: #f59e0b;
    --amber-bg: #fffbeb;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.02), 0 2px 8px rgba(0,0,0,0.03);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.05);
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d28;
    --border: #262a36;
    --text: #eef0f6;
    --text-secondary: #8b90a5;
    --text-tertiary: #5d6275;
    --accent: #4f8bff;
    --accent-dim: #141c33;
    --green: #22c55e;
    --green-bg: #0a1f15;
    --red: #f87171;
    --red-bg: #1f0d0d;
    --amber: #fbbf24;
    --amber-bg: #1f1808;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Layout ── */
  .app {
    max-width: 1040px; margin: 0 auto; padding: 28px 24px 48px;
    display: flex; flex-direction: column; gap: 24px;
  }

  /* ── Header ── */
  .header { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: relative; display: inline-grid; grid-template-columns: repeat(2, 36px);
    align-items: center; gap: 0; padding: 3px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); cursor: pointer;
  }
  .theme-toggle::before {
    content: ""; position: absolute; top: 3px; left: 3px;
    width: 36px; height: calc(100% - 6px); border-radius: 7px;
    background: var(--surface); box-shadow: var(--shadow);
    transform: translateX(0);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  [data-theme="light"] .theme-toggle::before { transform: translateX(36px); }
  .theme-btn {
    position: relative; z-index: 1; border: none; border-radius: 7px;
    width: 36px; height: 30px; padding: 0; background: transparent;
    color: var(--text-tertiary); cursor: pointer;
    transition: color 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .theme-btn.active { color: var(--text); }
  .theme-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Cards grid ── */
  .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .card:hover { box-shadow: var(--shadow-md); border-color: #d0d5e0; }
  [data-theme="dark"] .card:hover { border-color: #353a4a; }

  .card-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
  .card-value {
    font-size: 32px; font-weight: 700; letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 6px;
  }
  .card-value.up { color: var(--green); }
  .card-value.down { color: var(--red); }
  .card-value.neutral { color: var(--text); }

  .card-value .arrow { font-size: 18px; flex-shrink: 0; }
  .card-note { margin-top: 6px; font-size: 12px; color: var(--text-tertiary); }

  /* ── Panel ── */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px 24px 0; gap: 16px;
  }
  .panel-head h2 { font-size: 17px; font-weight: 600; }
  .panel-head p { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .panel-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .status-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); font-weight: 500;
  }
  .status-dot::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber); flex-shrink: 0;
  }
  .status-dot.ok::before { background: var(--green); }
  .status-dot.err::before { background: var(--red); }

  /* ── Button ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .btn:hover { background: var(--bg); border-color: #c8cdd8; }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }

  /* ── Table ── */
  .table-wrap { padding: 16px 24px 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 12px;
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
  }
  thead th:last-child, thead th:nth-child(2),
  thead th:nth-child(3), thead th:nth-child(4) { text-align: right; }
  tbody td {
    padding: 13px 12px; font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody td:last-child, tbody td:nth-child(2),
  tbody td:nth-child(3), tbody td:nth-child(4) { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg); }

  .asset-name { font-weight: 600; font-size: 13px; text-align: left !important; }
  .asset-code { font-size: 11px; color: var(--text-secondary); margin-top: 2px; text-align: left; }

  .pill {
    display: inline-flex; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; background: var(--accent-dim); color: var(--accent);
  }

  .val-up { color: var(--green); }
  .val-down { color: var(--red); }
  .val-neutral { color: var(--text-secondary); }

  /* ── Skeleton ── */
  .sk {
    background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  @media (max-width: 640px) {
    .app { padding: 20px 16px 40px; gap: 16px; }
    .cards { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header h1 { font-size: 22px; }
    .card { padding: 18px 20px; }
    .card-value { font-size: 26px; }
    .table-wrap { padding: 12px 16px 16px; }
    thead th, tbody td { padding: 10px 8px; font-size: 12px; }
    .panel-head { flex-direction: column; padding: 18px 20px 0; }
  }
</style>
</head>
<body data-theme="dark">

<main class="app">
  <header class="header">
    <h1>资产组合</h1>
    <div class="header-actions">
      <div class="theme-toggle" id="themeToggle" role="radiogroup" aria-label="切换主题">
        <button class="theme-btn active" data-v="dark" aria-label="深色主题">
          <svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg>
        </button>
        <button class="theme-btn" data-v="light" aria-label="浅色主题">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.56 1.56M17.51 17.51l1.56 1.56M2 12h2.2M19.8 12H22M4.93 19.07l1.56-1.56M17.51 6.49l1.56-1.56"></path></svg>
        </button>
      </div>
      <button class="btn" id="panelRefreshButton">刷新</button>
    </div>
  </header>

  <section class="cards">
    <div class="card">
      <div class="card-label">加权当日涨跌</div>
      <div class="card-value neutral" id="weightedDay">—</div>
      <div class="card-note">已获取当日数据的资产加权计算</div>
    </div>
    <div class="card">
      <div class="card-label">加权年初至今</div>
      <div class="card-value neutral" id="weightedYtd">—</div>
      <div class="card-note">已获取年初数据的资产加权计算</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <div>
        <h2>持仓明细</h2>
        <p>权重 · 日涨跌 · 年初至今表现</p>
      </div>
      <div class="panel-actions">
        <div class="status-dot" id="fetchStatus">加载中</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>资产</th>
            <th>权重</th>
            <th>当日涨跌</th>
            <th>年初至今</th>
          </tr>
        </thead>
        <tbody id="portfolioTable"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const portfolio = [
  { symbol: "usQQQ", historySymbol: "usQQQ.OQ", name: "纳斯达克100 ETF", weight: 15, type: "equity" },
  { symbol: "usVOO", historySymbol: "usVOO.AM", name: "标普500 ETF", weight: 35, type: "equity" },
  { symbol: "usSPMO", historySymbol: "usSPMO.AM", name: "标普500动量ETF", weight: 15, type: "equity" },
  { symbol: "usGLD", historySymbol: "usGLD.AM", name: "SPDR黄金ETF", weight: 10, type: "gold" },
  { symbol: "sh515450", historySymbol: "sh515450", name: "南方标普中国A股大盘红利低波50ETF", weight: 20, type: "equity" },
  { symbol: "jj000198", name: "现金", detail: "天弘余额宝货币", weight: 5, type: "cash" }
];

const AUTO_REFRESH_MS = 60 * 1000;
let isRefreshing = false;
let lastManualRefreshAt = 0;

function formatPercent(value) {
  if (typeof value !== "number" || Number.isNaN(value)) return "--";
  const sign = value > 0 ? "+" : "";
  return `${sign}${value.toFixed(2)}%`;
}

function getTrend(value) {
  if (typeof value !== "number" || Number.isNaN(value)) return { cls: "neutral", arrow: "" };
  if (value > 0) return { cls: "up", arrow: "▲" };
  if (value < 0) return { cls: "down", arrow: "▼" };
  return { cls: "neutral", arrow: "" };
}

function updateSummary(items) {
  const validDay = items.filter(i => typeof i.day === "number" && !Number.isNaN(i.day));
  const dw = validDay.reduce((s, i) => s + i.weight, 0);
  const wDay = dw > 0 ? validDay.reduce((s, i) => s + i.day * i.weight / dw, 0) : undefined;

  const validYtd = items.filter(i => typeof i.ytd === "number" && !Number.isNaN(i.ytd));
  const yw = validYtd.reduce((s, i) => s + i.weight, 0);
  const wYtd = yw > 0 ? validYtd.reduce((s, i) => s + i.ytd * i.weight / yw, 0) : undefined;

  const dayEl = document.getElementById("weightedDay");
  const tDay = getTrend(wDay);
  dayEl.innerHTML = `${tDay.arrow} ${formatPercent(wDay)}`;
  dayEl.className = `card-value ${tDay.cls}`;

  const ytdEl = document.getElementById("weightedYtd");
  const tYtd = getTrend(wYtd);
  ytdEl.innerHTML = `${tYtd.arrow} ${formatPercent(wYtd)}`;
  ytdEl.className = `card-value ${tYtd.cls}`;
}

function formatDisplaySymbol(s) {
  if (s === "jj000198") return "000198";
  return s.replace(/^(us|sh|sz|hk|bj)/, "");
}

async function fetchTencentData(symbols) {
  const url = `https://qt.gtimg.cn/q=${symbols.join(",")}`;
  const res = await fetch(url);
  const text = await res.text();
  const data = {};
  text.split(";").forEach(line => {
    const m = line.match(/v_(.+)="(.+)"/);
    if (!m) return;
    const [, sym, content] = m;
    const f = content.split("~");
    data[sym] = { price: parseFloat(f[3]), change: parseFloat(f[31]), day: parseFloat(f[32]), ytd: undefined };
  });
  return data;
}

async function fetchYtdData(symbol) {
  const now = new Date();
  const y = now.getFullYear();
  const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?_var=kline_dayqfq&param=${symbol},day,${y}-01-01,${y}-12-31,320,qfq`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.includes("=") ? text.slice(text.indexOf("=") + 1) : text);
  const root = json?.data?.[symbol];
  if (!root) return undefined;
  const series = root.qfqday || root.day;
  if (!Array.isArray(series) || !series.length) return undefined;
  const v = parseFloat(series[0][2]);
  return Number.isFinite(v) ? v : undefined;
}

function renderTable(items) {
  const tbody = document.getElementById("portfolioTable");
  tbody.innerHTML = "";
  items.forEach(item => {
    const t = getTrend(item.day);
    const ty = getTrend(item.ytd);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="asset-name">${item.name}<div class="asset-code">${item.detail || formatDisplaySymbol(item.symbol)}</div></td>
      <td><span class="pill">${item.weight}%</span></td>
      <td class="val-${t.cls}">${t.arrow} ${formatPercent(item.day)}</td>
      <td class="val-${ty.cls}">${ty.arrow} ${formatPercent(item.ytd)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  document.querySelectorAll("#themeToggle .theme-btn").forEach(s => {
    s.classList.toggle("active", s.dataset.v === theme);
  });
  localStorage.setItem("portfolio-theme", theme);
}

function setRefreshState(loading) {
  isRefreshing = loading;
  const btn = document.getElementById("panelRefreshButton");
  btn.disabled = loading;
  btn.textContent = loading ? "刷新中…" : "刷新";
}

async function renderPortfolio() {
  if (isRefreshing) return;
  setRefreshState(true);
  const status = document.getElementById("fetchStatus");
  const items = portfolio.map(i => ({ ...i }));
  const now = new Date();

  try {
    const symbols = items.filter(i => /^(us|sh|sz|hk|bj|jj)/.test(i.symbol)).map(i => i.symbol);
    const tencentData = await fetchTencentData(symbols);
    const ytdResults = await Promise.all(items.map(async i => {
      if (!i.historySymbol) return [i.symbol, undefined];
      try { return [i.symbol, await fetchYtdData(i.historySymbol)]; }
      catch (e) { console.error(e); return [i.symbol, undefined]; }
    }));
    const ytdMap = Object.fromEntries(ytdResults);

    items.forEach(item => {
      if (/^(us|sh|sz|hk|bj)/.test(item.symbol)) {
        const d = tencentData[item.symbol];
        const sp = ytdMap[item.symbol];
        item.price = d?.price;
        item.day = d?.day;
        item.ytd = typeof d?.price === "number" && typeof sp === "number" ? ((d.price / sp) - 1) * 100 : undefined;
      } else if (item.symbol === "jj000198") {
        const d = tencentData[item.symbol];
        item.price = typeof d?.price === "number" && d.price > 0 ? d.price : undefined;
        item.day = typeof d?.day === "number" && d.day !== 0 ? d.day : undefined;
        item.ytd = undefined;
      }
    });

    status.textContent = `已更新 ${now.toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit" })}`;
    status.className = "status-dot ok";
  } catch (e) {
    console.error(e);
    status.textContent = "加载失败";
    status.className = "status-dot err";
  } finally {
    setRefreshState(false);
  }

  renderTable(items);
  updateSummary(items);
}

(function init() {
  const saved = localStorage.getItem("portfolio-theme");
  if (saved === "light" || saved === "dark") applyTheme(saved);

  document.querySelectorAll("#themeToggle .theme-btn").forEach(btn => {
    btn.addEventListener("click", () => applyTheme(btn.dataset.v));
  });

  document.getElementById("panelRefreshButton").addEventListener("click", () => {
    const now = Date.now();
    if (now - lastManualRefreshAt < 500) return;
    lastManualRefreshAt = now;
    renderPortfolio();
  });

  renderPortfolio();
  setInterval(renderPortfolio, AUTO_REFRESH_MS);
})();
</script>
</body>
</html>
